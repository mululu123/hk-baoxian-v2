<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#2c5282" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="IIQE 刷題" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<title>IIQE 保險模擬試題刷題</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="app">
  <!-- 顶栏 -->
  <header id="topbar" hidden>
    <button id="btn-exit" class="ghost">← 退出</button>
    <div class="topbar-title">
      <span id="topbar-paper"></span>
      <span class="sep">›</span>
      <span id="topbar-mode"></span>
    </div>
    <div class="topbar-progress">
      <span id="topbar-counter"></span>
    </div>
  </header>

  <!-- 主视图容器 -->
  <main id="view"></main>

  <!-- 底栏（题号导航） -->
  <footer id="bottombar" hidden>
    <button id="btn-prev" class="ghost">‹ 上一題</button>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <button id="btn-next" class="primary">下一題 ›</button>
  </footer>
</div>

<script>window.QUESTION_BANKS = {};</script>
<script src="data/_meta.js"></script>
<!-- Cloud sync: supabase-js loaded async (non-blocking); sync.js is a no-op until configured -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
<script src="js/config.js" defer></script>
<script src="js/sync.js" defer></script>
<script src="js/app.js" defer></script>
<script>
  // Register service worker for offline + install-to-home-screen.
  // Only in production-like contexts (https or localhost); silently skip on file://.
  if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((e) => console.warn('SW register failed', e));
    });
  }
</script>
</body>
</html>
